        <section class="cadastro">
            <div class="cadastro-colunas">

                <!-- Formulário -->
                <div class="cadastro-form">
                    <h2>Cadastro</h2>
                    <form id="form-cadastro" novalidate>
                        <div class="campo-form">
                            <input type="text" id="nome" name="nome" placeholder="Nome">
                            <span class="erro" id="erro-nome"></span>
                        </div>

                        <div class="campo-form">
                            <input type="text" id="sobrenome" name="sobrenome" placeholder="Sobrenome">
                            <span class="erro" id="erro-sobrenome"></span>
                        </div>

                        <div class="campo-form">
                            <input type="email" id="email" name="email" placeholder="E-mail">
                            <span class="erro" id="erro-email"></span>
                        </div>

                        <p class="mensagem-sucesso" id="mensagem-sucesso"></p>

                        <button type="submit" class="btn-enviar">Enviar</button>
                    </form>
                </div>

                <!--Mapa -->
                <div class="cadastro-mapa">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3942.4!2d13.2343!3d-8.8368!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zOMKwNTAnMTIuNSJTIDEzwrAxNCcwMy41IkU!5e0!3m2!1spt!2sao!4v1234567890"
                        width="100%"
                        height="100%"
                        style="border:0;"
                        allowfullscreen=""
                        loading="lazy">
